# lectin set
lectin_set: "https://rest.uniprot.org/uniprotkb/stream?format=fasta&query=(taxonomy_id:2)+AND+(reviewed:true)"

# Fasta file of sequences to run
input_fasta: "data/input_query_dedup.fasta.gz"
  # "data/query_test2k.fasta"

# MMseqs2 Parameters
mmseqs_evalue: 1e-4
mmseqs_coverage: 0.5

# select_seq_clusters parameters for KNN selection strategy
knn_k_per_hop: [8, 4, 2]
knn_min_weight: 0

# SCC parameters
max_threads: 36
threads: 16

# this doesn't work
# min(config["max_threads"], workflow.cores) # assigns each rule a lower number if smaller node is requested

# --- Select Lectin Clusters Parameters---

# Minimum fraction of lectin-labeled members required to call a community
# a "known lectin cluster". 1.0 = pure lectin clusters only.
min_lectin_fraction: 0.7

# Minimum number of distinct known lectin clusters a candidate must bridge.
# 1 = any unknown linked to a known lectin cluster at threshold strength.
# 2 = paper-style "unifies multiple families".
min_bridge_count: 1

# Multiplier on each cluster's median within-cluster edge weight to set its
# admission threshold. 1.0 = exactly median (paper). >1.0 = stricter (require
# stronger-than-median similarity). <1.0 = more permissive.
weight_strictness_multiplier: 1.5

# Label that identifies known lectins in the nodes 'category' column.
lectin_category_label: "lectin"

# Minimum size of a community to be considered a "known lectin cluster".
# Clusters of 1-2 members have no meaningful internal median.
min_known_cluster_size: 3

# Structure clustering step
structure_min_score: 0.7
structure_max_outbound_edges: 4
structure_score_column: alntmscore